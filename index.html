/* ---------------- STATE / PERSISTENCE ---------------- */
const LS_KEY="careerDash_v1";
let DB;
function load(){
  const saved=localStorage.getItem(LS_KEY);
  if(saved){try{DB=JSON.parse(saved);}catch(e){DB=structuredClone(SEED);}}
  else DB=structuredClone(SEED);
  // ensure new seed-only (analysis) sections always reflect latest
  DB.profile=SEED.profile;DB.resume=SEED.resume;DB.skills=SEED.skills;DB.jobs=SEED.jobs;DB.resumeDoc=SEED.resumeDoc;DB.recruiters=SEED.recruiters;
  DB.externalResumes=SEED.externalResumes;
  DB.tailorRequests=DB.tailorRequests||[]; // user-tracking queue: persists across loads, not reset from SEED
}
function save(){DB.savedAt=new Date().toISOString();localStorage.setItem(LS_KEY,JSON.stringify(DB));renderUpdated();}
function renderUpdated(){document.getElementById('lastUpdated').textContent='Data updated '+new Date(DB.savedAt||Date.now()).toLocaleString();}
function resetData(){if(confirm('Reset ALL tracking data to seed defaults?')){localStorage.removeItem(LS_KEY);load();save();renderAll();}}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='career-dashboard-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
const uid=()=>Date.now()+Math.floor(Math.random()*999);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------------- TABS ---------------- */
const TABS=[
  ["overview","Overview"],["resumedoc","My Resume"],["resume","Resume Analysis"],["skills","Skill Gaps"],
  ["jobs","Job Matches"],["external","External JD Resumes"],["apps","Applications"],["interviews","Interviews"],
  ["network","Networking"],["companies","Target Companies"],["recruiters","Recruiters"],["growth","Growth"]
];
function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=TABS.map((x,i)=>`<button class="tab${i===0?' active':''}" data-v="${x[0]}" onclick="switchTab('${x[0]}')">${x[1]}</button>`).join('');
}
function switchTab(v){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id==='v-'+v));
}

/* ---------------- HELPERS ---------------- */
function color(v){return v>=80?'var(--good)':v>=60?'var(--accent)':v>=45?'var(--warn)':'var(--bad)';}
function bar(v){return `<div class="bar"><span style="width:${v}%;background:${color(v)}"></span></div>`;}
function gauge(v,label){
  const r=52,c=2*Math.PI*r,off=c*(1-v/100);
  return `<div class="gauge"><svg width="150" height="150" viewBox="0 0 150 150">
    <circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="14"/>
    <circle cx="75" cy="75" r="${r}" fill="none" stroke="${color(v)}" stroke-width="14"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 75 75)"/>
    <text x="75" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="var(--txt)">${v}</text>
    <text x="75" y="94" text-anchor="middle" font-size="11" fill="var(--muted)">${label||''}</text>
  </svg></div>`;
}

/* ----- JOB MATCHES ----- */
let jobSort={k:'score',dir:-1};
function locBonus(loc){
  const l=(loc||'').toLowerCase();
  if(l.includes('gurugram')||l.includes('gurgaon')) return 8;
  if(l.includes('bangalore')||l.includes('bengaluru')) return 5;
  return 0;
}
function score(j){return Math.min(100,Math.round(j.fit*0.4 + j.comp*0.2 + j.growth*0.2 + j.prob*0.2) + locBonus(j.loc));}
function srcOf(j){
  if(j.src) return j.src;
  const u=(j.url||'').toLowerCase();
  if(u.includes('naukri')) return 'Naukri';
  if(u.includes('linkedin')) return 'LinkedIn';
  if(u.includes('wellfound')||u.includes('angel.co')) return 'Wellfound';
  if(u.includes('workatastartup')||u.includes('ycombinator')) return 'YC';
  if(u.includes('indeed')) return 'Indeed';
  return 'Web';
}
function srcColor(s){return {Indeed:'#2557a7',Naukri:'#6a3df0',LinkedIn:'#0a66c2',YC:'#ff6600',Wellfound:'#11a3a3',Web:'#888'}[s]||'#888';}
function srcTag(j){const s=srcOf(j);return `<span class="pill" style="background:${srcColor(s)}22;color:${srcColor(s)}">${esc(s)}</span>`;}
function agize(d){if(!d)return '—';const then=new Date(d+'T00:00:00');const days=Math.max(0,Math.round((Date.now()-then)/86400000));
  if(days<=0)return 'Today';if(days===1)return '1d ago';if(days<7)return days+'d ago';if(days<30)return Math.round(days/7)+'w ago';if(days<365)return Math.round(days/30)+'mo ago';return Math.round(days/365)+'y ago';}
function ageColor(d){if(!d)return 'var(--muted)';const days=Math.max(0,Math.round((Date.now()-new Date(d+'T00:00:00'))/86400000));return days<=7?'var(--good)':days<=21?'var(--warn)':'var(--bad)';}
function renderJobs(){
  const rows=[...DB.jobs].sort((a,b)=>{
    const k=jobSort.k; const av=k==='score'?score(a):(k==='src'?srcOf(a):a[k]), bv=k==='score'?score(b):(k==='src'?srcOf(b):b[k]);
    if(typeof av==='string')return jobSort.dir*av.localeCompare(bv);
    return jobSort.dir*(av-bv);
  });
  const sources=[...new Set(DB.jobs.map(srcOf))];
  const applied=new Set(DB.applications.map(a=>a.link));
  document.getElementById('v-jobs').innerHTML=`
   <div class="toolbar">
     <b>${DB.jobs.length} live matches</b>
     <span class="muted">· sources: ${sources.map(s=>`<span class="pill" style="background:${srcColor(s)}22;color:${srcColor(s)}">${esc(s)}</span>`).join(' ')} · click a title to apply · click "＋ Track" to push into your pipeline · click "✎ Tailor my Resume" then "Submit new issue" to queue that job for Claude to tailor next chat · "Needs info" means Claude found a gap and left a question on the issue</span>
   </div>
   <div class="card" style="padding:6px 4px">
   <table><thead><tr>
     ${[['title','Role'],['co','Company'],['loc','Location'],['src','Source'],['posted','Posted'],['fit','Fit'],['comp','Comp'],['growth','Growth'],['prob','Hire %'],['score','Score']].map(c=>`<th onclick="setJobSort('${c[0]}')">${c[1]}${jobSort.k===c[0]?(jobSort.dir<0?' ▾':' ▴'):''}</th>`).join('')}
     <th></th><th>Tailor My Resume</th></tr></thead><tbody>
   ${rows.map(j=>`<tr>
     <td><a href="${j.url}" target="_blank"><b>${esc(j.title)}</b></a> <a href="${j.url}" target="_blank" class="mini" title="Open application link">↗ apply</a><div class="legend">${esc(j.why)}</div></td>
     <td class="muted">${esc(j.co)}</td>
     <td class="muted nowrap">${esc(j.loc)}</td>
     <td class="nowrap">${srcTag(j)}</td>
     <td class="nowrap"><b style="color:${ageColor(j.posted)}">${agize(j.posted)}</b><div class="legend" style="margin-top:0">${esc(j.posted||'')}</div></td>
     <td style="color:${color(j.fit)}">${j.fit}</td>
     <td style="color:${color(j.comp)}">${j.comp}</td>
     <td style="color:${color(j.growth)}">${j.growth}</td>
     <td style="color:${color(j.prob)}">${j.prob}</td>
     <td><span class="scorebadge" style="background:${color(score(j))}22;color:${color(score(j))}">${score(j)}</span></td>
     <td class="nowrap">${applied.has(j.url)?'<span class="pill good">tracked</span>':`<button class="btn" onclick="trackJob('${j.id}')">＋ Track</button>`}</td>
     <td class="nowrap">${tailorCell(j)}</td>
   </tr>`).join('')}
   </tbody></table></div>
   <div class="note">Scores are an analytical estimate, <b>calibrated to a 5-year general-PM level</b> (Jun 2026): Senior/Staff roles get a hiring-probability + fit lift (now in-band for you), junior roles a fit cut (you're over-qualified), mid roles a small probability lift. <b>Location priority: Gurugram (+8) then Bangalore (+5)</b> are added to the composite score so your top target cities sort to the top by default. Treat hiring-probability as a prioritization hint, not a guarantee. Always read the full JD before applying.</div>`;
}
function setJobSort(k){if(jobSort.k===k)jobSort.dir*=-1;else{jobSort.k=k;jobSort.dir=-1;}renderJobs();}
function trackJob(id){
  const j=DB.jobs.find(x=>x.id===id);if(!j)return;
  DB.applications.push({id:uid(),role:j.title,co:j.co,stage:"To Apply",date:new Date().toISOString().slice(0,10),link:j.url,notes:j.why});
  save();renderJobs();renderApps();renderOverview();
  switchTab('apps');
}

/* ----- TAILOR MY RESUME (approve a job -> queues it for Claude to tailor by hand) -----
   Static site can't run anything itself, and free automated LLM options turned out to be a
   dead end (Anthropic has no free tier; Gemini's free tier hit an unresolved account-level
   quota=0 restriction) -- so this is a durable to-do queue, not an automated pipeline.
   Approving a job here (a) saves it to a local queue so you don't lose track of it, (b) gives
   an instant estimated JD-match % if you paste the JD, and (c) opens a pre-filled GitHub Issue
   (label `tailor-resume`) -- one click on "Submit new issue" there queues it. Next time you're
   in a Claude Code chat, ask Claude to process the open tailor-resume issues; it tailors the
   resume, writes "resume" + "matchScore" onto the job in seed_jobs.json, and this column then
   shows the real download + score. If the JD needs a skill/project Claude can't find on file,
   it instead writes "tailorNote" (+ "tailorIssue") onto the job -- shown here as "Needs info" --
   and asks the specific question as a comment on that GitHub issue; answer it there or in your
   next chat and Claude finishes the tailoring. */
const REPO_URL="https://github.com/kshitizyadav788-svg/career-dashboard";
function jdMatchScore(jdText){
  if(!jdText) return null;
  const stop=new Set(['the','and','for','with','you','are','our','that','this','will','have','from','your','role','job','team','work','years','experience','including','across','into','who','what','when','their','they','more','than','also','able','such','can','not','all','any','other','skills','requirements','responsibilities']);
  const resumeText=(DB.resumeDoc.competencies+' '+DB.resumeDoc.summary+' '+DB.resumeDoc.skills.map(s=>s[1]).join(' ')).toLowerCase();
  const resumeSet=new Set((resumeText.match(/[a-z][a-z0-9+.#/-]{2,}/g)||[]).filter(w=>!stop.has(w)));
  const jdWords=(jdText.toLowerCase().match(/[a-z][a-z0-9+.#/-]{2,}/g)||[]).filter(w=>!stop.has(w));
  const meaningful=[...new Set(jdWords)];
  if(!meaningful.length) return null;
  const hits=meaningful.filter(w=>resumeSet.has(w)).length;
  return Math.round(100*hits/meaningful.length);
}
function tailorIssueUrl(req,j){
  const params=new URLSearchParams({
    template:'tailor-resume.yml', labels:'tailor-resume',
    title:`Tailor resume: ${j.title} @ ${j.co}`,
    job_id:j.id, role:j.title, company:j.co, location:j.loc||'', jd_url:j.url||'', jd_text:req.jd||''
  });
  return `${REPO_URL}/issues/new?${params.toString()}`;
}
function requestTailor(id){
  const j=DB.jobs.find(x=>x.id===id);if(!j)return;
  const jd=prompt("Paste the full job description (optional -- gives you an instant estimated match score and lets the auto-tailor Action produce a sharper resume). Leave blank to let the Action try to fetch the JD itself:","")||"";
  DB.tailorRequests=DB.tailorRequests||[];
  const req={id:uid(),jobId:j.id,title:j.title,co:j.co,url:j.url,jd,requestedAt:new Date().toISOString().slice(0,10)};
  DB.tailorRequests.push(req);
  save();
  window.open(tailorIssueUrl(req,j),'_blank');
  alert('Saved as "Requested". A pre-filled GitHub Issue just opened in a new tab -- click "Submit new issue" there to queue it. Next time you\'re in a Claude Code chat, ask Claude to process your tailor-resume queue and it\'ll tailor the resume, commit it, and this column will show the download + score.');
  renderJobs();
}
function reopenTailorIssue(jobId){
  const j=DB.jobs.find(x=>x.id===jobId);const req=(DB.tailorRequests||[]).find(r=>r.jobId===jobId);
  if(!j||!req)return;
  window.open(tailorIssueUrl(req,j),'_blank');
}
function cancelTailor(jobId){
  DB.tailorRequests=(DB.tailorRequests||[]).filter(r=>r.jobId!==jobId);
  save();renderJobs();
}
function tailorCell(j){
  if(j.resume){
    const s=j.matchScore;
    return `<div class="flex" style="gap:6px">
      <a class="btn" href="${encodeURI(j.resume)}" target="_blank" download>⭳ Resume</a>
      ${s!=null?`<span class="scorebadge" style="background:${color(s)}22;color:${color(s)}">${s}</span>`:''}
    </div>`;
  }
  if(j.tailorNote){
    return `<div>
      <span class="pill warn">🏳 Needs info</span>
      <div class="mini" style="margin-top:4px;max-width:220px">${esc(j.tailorNote)}</div>
      ${j.tailorIssue?`<div style="margin-top:4px"><a href="${REPO_URL}/issues/${j.tailorIssue}" target="_blank" class="mini">↗ reply on issue #${j.tailorIssue}</a></div>`:''}
    </div>`;
  }
  const req=(DB.tailorRequests||[]).find(r=>r.jobId===j.id);
  if(req){
    const est=req.jd?jdMatchScore(req.jd):null;
    return `<div>
      <span class="pill warn">Requested</span>${est!=null?` <span class="mini">~${est}% match (est.)</span>`:''}
      <div class="flex" style="margin-top:4px">
        <button class="btn" onclick="reopenTailorIssue('${j.id}')" title="Haven't submitted the issue yet? Reopen it">↗ Reopen issue</button>
        <button class="btn danger" onclick="cancelTailor('${j.id}')" title="Cancel request">✕</button>
      </div>
    </div>`;
  }
  return `<button class="btn primary" onclick="requestTailor('${j.id}')">✎ Tailor my Resume</button>`;
}

     <td><button class="btn danger" onclick="delRow('companies',${c.id})">✕</button></td></tr>`).join('')}
   </tbody></table></div>`;
}
function setCStatus(id,v){const c=DB.companies.find(x=>x.id===id);if(c){c.status=v;save();renderCompanies();}}
function addCompany(){
  const name=prompt("Company name?");if(!name)return;
  const tier=prompt("Tier (A/B/C)?","B")||"B";
  DB.companies.push({id:uid(),name,tier:tier.toUpperCase(),status:"Watchlist",notes:""});
  save();renderCompanies();
}

/* ----- RECRUITERS ----- */
function renderRecruiters(){
  const rs=DB.recruiters||[];
  document.getElementById('v-recruiters').innerHTML=`
   <div class="toolbar"><b>${rs.length} recruitment firms hiring Product Managers</b>
     <span class="muted">· ordered by fit for your 5-yr B2C-PM profile</span></div>
   <div class="note">How to use: most don't take public applications — <b>submit your CV on each firm's site</b> and <b>connect with their consultants on LinkedIn</b> (search "&lt;firm&gt; product manager recruiter India"). Register with 3–4 (not just one), keep it warm, and re-ping every few weeks.</div>
   <div class="card" style="padding:6px 4px;margin-top:14px"><table><thead><tr>
     <th>Firm</th><th>Type</th><th>Roles they hire</th><th>Sectors</th><th>Base</th><th>Fit for you</th></tr></thead><tbody>
   ${rs.map(r=>`<tr>
     <td><a href="${r.link}" target="_blank"><b>${esc(r.firm)}</b></a> <a href="${r.link}" target="_blank" class="mini">↗</a></td>
     <td class="muted">${esc(r.type)}</td>
     <td>${esc(r.roles)}</td>
     <td class="muted">${esc(r.sectors)}</td>
     <td class="muted nowrap">${esc(r.hq)}</td>
     <td><span class="pill ${/^High/.test(r.fit)?'good':/Medium/.test(r.fit)?'warn':'acc'}">${esc(r.fit)}</span></td>
   </tr>`).join('')}
   </tbody></table></div>`;
}

/* ----- GROWTH ----- */
function renderGrowth(){
  document.getElementById('v-growth').innerHTML=`
   <div class="toolbar"><button class="btn primary" onclick="addGoal()">＋ Add goal</button></div>
   <div class="grid g2">
   ${DB.growth.map(g=>`<div class="card">
     <div class="spread"><div><b>${esc(g.goal)}</b><div class="legend"><span class="tag">${esc(g.cat)}</span> target ${esc(g.target)}</div></div>
       <button class="btn danger" onclick="delRow('growth',${g.id})">✕</button></div>
     <div class="row-flex" style="margin-top:8px"><span class="muted">${g.progress}%</span>
       <input type="range" min="0" max="100" value="${g.progress}" oninput="setProgress(${g.id},this.value)" style="flex:1"></div>
     ${bar(g.progress)}
   </div>`).join('')}
   </div>`;
}
function setProgress(id,v){const g=DB.growth.find(x=>x.id===id);if(g){g.progress=+v;save();renderGrowth();renderOverview();}}
function addGoal(){
  const goal=prompt("Goal?");if(!goal)return;
  const cat=prompt("Category (Skill/Brand/Pipeline/Other)?","Skill")||"Skill";
  const target=prompt("Target date (YYYY-MM-DD)?")||"";
  DB.growth.push({id:uid(),goal,cat,progress:0,target});
  save();renderGrowth();renderOverview();
}

function delRow(coll,id){DB[coll]=DB[coll].filter(x=>x.id!==id);save();renderAll();}

/* ---------------- INIT ---------------- */
function renderAll(){
  renderOverview();renderResumeDoc();renderResume();renderSkills();renderJobs();renderExternalResumes();
  renderApps();renderInterviews();renderNetwork();renderCompanies();renderRecruiters();renderGrowth();
}
/* ---- live jobs feed: used when hosted with an hourly-refreshed jobs.json;
   fails silently when opened locally (file://) so the baked-in jobs stay. ---- */
async function loadLiveJobs(){
  try{
    const res=await fetch('jobs.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) return;
    const data=await res.json();
    if(data&&Array.isArray(data.jobs)&&data.jobs.length){
      DB.jobs=data.jobs;
      renderJobs();renderOverview();
      if(data.updated){const el=document.getElementById('lastUpdated');if(el)el.textContent='Jobs auto-refreshed '+new Date(data.updated).toLocaleString();}
    }
  }catch(e){/* local/offline: keep baked-in jobs */}
}
/* ---- external JD-wise resumes: hosted = loads external_resumes.json (Claude maintains it by
   hand); fails silently offline so the baked-in list stays. ---- */
async function loadExternalResumes(){
  try{
    const res=await fetch('external_resumes.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) return;
    const data=await res.json();
    if(data&&Array.isArray(data.resumes)){
      DB.externalResumes=data.resumes;
      renderExternalResumes();
    }
  }catch(e){/* local/offline: keep baked-in list */}
}
load();buildTabs();renderAll();renderUpdated();loadLiveJobs();loadExternalResumes();
</script>
