name: Tailor Resume

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  tailor:
    if: contains(github.event.issue.labels.*.name, 'tailor-resume')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LibreOffice (docx -> pdf)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libreoffice

      - name: Install Python deps
        run: pip install python-docx requests beautifulsoup4 google-generativeai

      - name: Tailor resume
        id: tailor
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tailor_resume.py

      - name: Commit tailored resume + updated job data
        env:
          ROLE: ${{ steps.tailor.outputs.role }}
          COMPANY: ${{ steps.tailor.outputs.company }}
          MATCH_SCORE: ${{ steps.tailor.outputs.matchScore }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resumes/ seed_jobs.json jobs.json
          git commit -m "Tailor resume: $ROLE @ $COMPANY (match $MATCH_SCORE)

          Closes #$ISSUE_NUM"

          if git push; then
            exit 0
          fi

          # Same race the hourly refresh Action can hit: another commit landed on
          # main (usually the hourly refresh) while this job was running. jobs.json
          # is fully regenerated from seed_jobs.json + the live feed anyway, so on
          # conflict we just take our seed_jobs.json (the durable, authoritative
          # side here) and rebuild jobs.json from the remote's fresher live feed.
          echo "Push rejected -- pulling and reconciling jobs.json"
          git pull --no-rebase --no-edit
          if git status --porcelain | grep -q '^UU jobs.json$'; then
            git show origin/main:jobs.json > /tmp/remote_jobs.json
            python - <<'PY'
          import json
          from fetch_jobs import merge_jobs, write_jobs_json
          seed = json.load(open("seed_jobs.json", encoding="utf-8"))["jobs"]
          remote = json.load(open("/tmp/remote_jobs.json", encoding="utf-8"))
          fresh = [j for j in remote.get("jobs", []) if str(j.get("id", "")).startswith(("JS_", "AZ_"))]
          write_jobs_json(merge_jobs(seed, fresh))
          PY
            git add jobs.json
            git commit -m "Merge: regenerate jobs.json after concurrent refresh"
          fi
          git push

      - name: Comment on issue and close it
        uses: actions/github-script@v7
        env:
          DOCX: ${{ steps.tailor.outputs.docx }}
          PDF: ${{ steps.tailor.outputs.pdf }}
          MATCH_SCORE: ${{ steps.tailor.outputs.matchScore }}
          JD_FETCHED: ${{ steps.tailor.outputs.jdFetched }}
        with:
          script: |
            const { DOCX, PDF, MATCH_SCORE, JD_FETCHED } = process.env;
            const body = [
              `Tailored resume ready — estimated JD match: **${MATCH_SCORE}/100**.`,
              JD_FETCHED === 'true' ? '' : '_Note: could not auto-fetch the JD from the link; for a sharper match, reopen this request with the JD pasted in._',
              `- [Download .docx](../../blob/main/${DOCX})`,
              `- [Download .pdf](../../blob/main/${PDF})`,
              '',
              'The dashboard will show this the next time it loads.'
            ].filter(Boolean).join('\n');
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: 'closed' });
